name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Restore, build, test, pack
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore TinyValidations.sln

      - name: Build
        run: dotnet build TinyValidations.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test TinyValidations.sln --configuration Release --no-build

      - name: Pack
        run: dotnet pack src/TinyValidations/TinyValidations.csproj --configuration Release --no-build --output artifacts/packages

